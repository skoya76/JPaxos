#################################
### JPaxos E2E configuration ####
#################################

# container DNS names inside docker-compose network
process.0 = replica0:2021:3001
process.1 = replica1:2022:3002
process.2 = replica2:2023:3003

# keep baseline deterministic for E2E
CrashModel = CrashStop
Network = TCP
LogPath = /tmp/jpaxosLogs

# FD defaults
FDSuspectTimeout = 1000
FDSendTimeout = 100

# Dynatune parameters
DynatuneEnabled = true
DynatuneSafetyFactor = 2.0
DynatuneHeartbeatProbability = 0.95
DynatuneMinListSize = 5
DynatuneMaxListSize = 200

# basic throughput parameters
WindowSize = 4
BatchSize = 8192
MaxBatchDelay = 10
